name: PR Tests

on:
  pull_request:
    branches: [ 'master' ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout 🛎️'
        uses: actions/checkout@v4
      - name: 'Setup JDK 21 📦'
        uses: actions/setup-java@v4
        with:
          java-version: |
            17
            21
          distribution: 'temurin'
      - name: 'Setup Gradle 🏗️'
        uses: gradle/actions/setup-gradle@v4
      - name: 'Build & Test 🔨'
        run: ./gradlew clean build test
