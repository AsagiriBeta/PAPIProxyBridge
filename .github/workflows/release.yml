name: Release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    name: 'Build & Release'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout 🛎️'
        uses: actions/checkout@v4
      - name: 'Setup JDK 21 📦'
        uses: actions/setup-java@v4
        with:
          java-version: |
            17
            21
          distribution: 'temurin'
      - name: 'Setup Gradle 🏗️'
        uses: gradle/actions/setup-gradle@v4
      - name: 'Build 🔨'
        run: ./gradlew clean build test
      - name: 'Upload Release Assets 📦'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/PAPIProxyBridge-Bukkit-*.jar
            target/PAPIProxyBridge-Bungee-*.jar
            target/PAPIProxyBridge-Velocity-*.jar
            target/PAPIProxyBridge-Fabric-*.jar
            target/PAPIProxyBridge-Common-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
